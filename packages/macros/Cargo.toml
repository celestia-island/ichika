[package]
name = "ichika-macros"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

publish = true
authors.workspace = true
description = "A helper library for automatically constructing a thread pool that communicates via message pipes."
license = "SySL-1.0"
repository = "https://github.com/celestia-island/ichika"
keywords = ["thread-pool", "pipeline", "flume", "concurrency", "pipe"]
categories = ["concurrency", "asynchronous"]

[lib]
proc-macro = true

[dependencies]
anyhow = { workspace = true }

syn = { version = "^2", features = ["full", "extra-traits"] }
proc-macro2 = { version = "^1", features = ["span-locations"] }
quote = "^1"

[features]
tokio = []
async-std = []
